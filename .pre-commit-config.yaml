repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [check, wagents/, tests/, skills/skill-creator/scripts/]
      - id: ruff-format
        args: [wagents/, tests/, skills/skill-creator/scripts/]

  - repo: local
    hooks:
      - id: ty
        name: Type-check Python code
        entry: uv run ty check
        language: system
        pass_filenames: false
        files: ^(wagents/|scripts/)
      - id: wagents-validate
        name: Validate skills and agents
        entry: uv run wagents validate
        language: system
        pass_filenames: false
        files: ^(skills/|agents/)
      - id: docs-build-check
        name: "Verify docs build"
        entry: sh -c 'uv run wagents docs generate --no-installed && pnpm --dir docs exec astro check && pnpm --dir docs build'
        language: system
        files: '^(docs/.*\.(mdx|css|mjs|astro)|skills/|agents/|mcp/)'
        pass_filenames: false
