name: Release Skills

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - name: Validate assets
        run: uv run wagents validate
      - name: Audit skills (strict)
        run: uv run python skills/skill-creator/scripts/audit.py --all --strict
      - name: Run tests
        run: uv run pytest
      - name: Lint
        run: uv run ruff check
      - name: Format check
        run: uv run ruff format --check
      - name: Type check
        run: uv run ty check --output-format github --no-progress

  package-and-release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Package all skills
        run: uv run wagents package --all --output dist/
      - name: Verify packaging artifacts
        run: |
          test -f dist/manifest.json || { echo "Missing dist/manifest.json"; exit 1; }
          count=$(find dist -maxdepth 1 -name '*.zip' | wc -l | tr -d ' ')
          test "$count" -gt 0 || { echo "No .zip files in dist/"; exit 1; }
          echo "Found $count skill ZIP(s) and manifest.json"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.zip
            dist/manifest.json
          generate_release_notes: true