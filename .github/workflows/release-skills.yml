name: Release Skills

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - name: Validate assets
        run: uv run wagents validate
      - name: Audit skills (strict)
        run: uv run python skills/skill-creator/scripts/audit.py --all --strict
      - name: Run tests
        run: uv run pytest
      - name: Lint
        run: uv run ruff check
      - name: Format check
        run: uv run ruff format --check
      - name: Type check
        run: uv run ty check --output-format github --no-progress

  package-and-release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Package all skills
        run: uv run wagents package --all --output dist/
      - name: Verify packaging artifacts
        run: |
          test -f dist/manifest.json || { echo "Missing dist/manifest.json"; exit 1; }
          count=$(find dist -maxdepth 1 -name '*.zip' | wc -l | tr -d ' ')
          test "$count" -gt 0 || { echo "No .zip files in dist/"; exit 1; }
          echo "Found $count skill ZIP(s) and manifest.json"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.zip
            dist/manifest.json
          generate_release_notes: true