name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - run: uv run ruff check
      - run: uv run ruff format --check

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - run: uv run ty check --output-format github --no-progress

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - run: uv run pytest --cov=wagents --cov-report=term-missing

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - run: uv run wagents validate
      - run: uv run wagents readme --check
      - run: uv run wagents apm materialize --check
      - run: uv run wagents apm doctor
      - run: uv run pytest tests/test_skills_catalog_schemas.py tests/test_catalog_index_parity.py tests/test_skill_index.py tests/test_authoring_sync.py tests/test_apm_materialize.py tests/test_wagents_self.py -q --tb=line
      - run: uv run wagents openspec validate
      - run: uv run wagents skills sync --dry-run
      - run: uv run wagents catalog index --check

  apm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - run: uv pip install apm-cli==0.21.0
      - run: apm audit --ci --no-drift
      - run: |
          if [ -f apm.lock.yaml ]; then
            apm install --frozen --only apm
          else
            echo "No apm.lock.yaml; skipping frozen install"
          fi

  wagents-wheel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - run: uv build
      - run: uv tool install "$(find dist -maxdepth 1 -name 'wagents-*.whl' -print -quit)" --force
      - run: wagents self doctor --format json
      - run: wagents validate

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-uv
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
          package_json_file: docs/package.json
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: uv run wagents docs generate --no-installed --check
      - run: uv run wagents catalog index --check
      - run: uv run wagents docs compose --check-composed --min-pct 100 --write-manifest
      - run: uv run wagents docs lint
      - run: cd docs && pnpm install --frozen-lockfile
      - run: cd docs && pnpm exec astro check
      - run: cd docs && pnpm build