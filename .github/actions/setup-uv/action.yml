name: Setup uv workspace
description: Checkout repository and sync Python dependencies with uv caching.
inputs:
  enable-cache:
    description: Enable uv dependency cache via astral-sh/setup-uv
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        enable-cache: ${{ inputs.enable-cache }}
    - run: uv sync
      shell: bash