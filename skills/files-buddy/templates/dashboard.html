<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>files-buddy Storage Command Center</title>
<style>
:root {
  color-scheme: dark;
  --bg: #080b12;
  --fg: #eef4ff;
  --muted: #91a1b8;
  --card: rgba(20, 26, 40, 0.86);
  --card-strong: rgba(28, 36, 54, 0.96);
  --border: rgba(144, 161, 185, 0.22);
  --primary: #7cc7ff;
  --success: #74e3a4;
  --warning: #ffd166;
  --danger: #ff7a90;
  --violet: #c7a7ff;
  --cloud: #76a9ff;
  --shadow: 0 24px 80px rgba(0,0,0,0.34);
  --radius: 20px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 12% 8%, rgba(124,199,255,.2), transparent 34rem),
    radial-gradient(circle at 84% 4%, rgba(199,167,255,.18), transparent 30rem),
    linear-gradient(180deg, #090d16 0%, #080b12 52%, #0d111a 100%);
  color: var(--fg);
  font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
}
main { width: min(1480px, calc(100vw - 32px)); margin: 0 auto; padding: 28px 0 44px; }
h1, h2, h3 { margin: 0; letter-spacing: -0.035em; }
h1 { font-size: clamp(2rem, 4vw, 4.6rem); line-height: .92; max-width: 900px; }
h2 { font-size: 1.04rem; color: #dce7f8; }
h3 { font-size: .92rem; color: #dce7f8; }
p { margin: 0; color: var(--muted); }
button { font: inherit; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
.hero { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr); gap: 18px; margin-bottom: 18px; }
.hero-copy, .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); backdrop-filter: blur(18px); }
.hero-copy { padding: clamp(24px, 4vw, 48px); position: relative; overflow: hidden; }
.hero-copy:after { content:""; position:absolute; inset:auto -15% -40% 45%; height:260px; background: radial-gradient(circle, rgba(116,227,164,.16), transparent 64%); pointer-events:none; }
.eyebrow { color: var(--primary); font-size: .78rem; text-transform: uppercase; letter-spacing: .22em; font-weight: 800; margin-bottom: 18px; }
.subhead { max-width: 760px; margin-top: 18px; font-size: 1.05rem; }
.meta-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
.badge { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border); border-radius: 999px; padding: 7px 11px; color: #dce7f8; background: rgba(255,255,255,.035); font-size: .78rem; font-weight: 700; }
.badge.success { color: var(--success); border-color: rgba(116,227,164,.36); }
.badge.warning { color: var(--warning); border-color: rgba(255,209,102,.38); }
.badge.danger { color: var(--danger); border-color: rgba(255,122,144,.38); }
.status-card { padding: 22px; display: flex; flex-direction: column; justify-content: space-between; min-height: 320px; }
.phase { color: var(--muted); font-size: .9rem; margin-top: 8px; }
.progress-track { width: 100%; height: 12px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; margin: 18px 0 10px; }
.progress-bar { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), var(--success)); width: 0%; }
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 18px; }
.card { padding: 20px; }
.span-3 { grid-column: span 3; }
.span-4 { grid-column: span 4; }
.span-5 { grid-column: span 5; }
.span-6 { grid-column: span 6; }
.span-7 { grid-column: span 7; }
.span-8 { grid-column: span 8; }
.span-12 { grid-column: span 12; }
.stat-value { font-size: clamp(1.6rem, 3vw, 3rem); line-height: 1; font-weight: 900; letter-spacing: -.06em; margin: 12px 0 4px; }
.stat-label { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; font-weight: 800; }
.chart-bars { display: grid; gap: 12px; margin-top: 16px; }
.bar-row { display: grid; grid-template-columns: minmax(110px, 180px) 1fr auto; gap: 12px; align-items: center; }
.bar-label { color: #dce7f8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-shell { height: 13px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
.bar-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), var(--violet)); width: 0%; }
.treemap { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 16px; }
.tile { min-height: 112px; border-radius: 16px; padding: 13px; border: 1px solid rgba(255,255,255,.12); background: linear-gradient(135deg, rgba(124,199,255,.26), rgba(199,167,255,.14)); display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; }
.tile strong { word-break: break-word; }
.recommendations { display: grid; gap: 12px; margin-top: 16px; }
.rec { border: 1px solid var(--border); border-radius: 16px; padding: 14px; background: rgba(255,255,255,.035); }
.rec-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
.rec-path { color: #dce7f8; word-break: break-word; }
.rec-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: .88rem; }
th, td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.08); text-align: start; vertical-align: top; }
th { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .13em; }
.timeline { margin-top: 16px; display: grid; gap: 10px; }
.event { border-inline-start: 2px solid var(--primary); padding-inline-start: 12px; color: var(--muted); }
.empty { padding: 24px; border: 1px dashed var(--border); border-radius: 16px; color: var(--muted); text-align: center; }
.footer { color: var(--muted); margin-top: 22px; text-align:center; font-size:.82rem; }
@media (max-width: 980px) {
  .hero, .grid { display: block; }
  .card, .status-card { margin-top: 16px; }
  .bar-row { grid-template-columns: 1fr; gap: 6px; }
}
@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<script id="data" type="application/json">{}</script>
<script id="progress-config" type="application/json">{}</script>
<main id="app"></main>
<script>
(function(){
  function esc(value){ return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]; }); }
  function num(value){ return (typeof value === 'number' && isFinite(value)) ? value : 0; }
  function fmtBytes(bytes){
    bytes = num(bytes);
    var units = ['B','KB','MB','GB','TB','PB']; var i = 0; var v = Math.abs(bytes);
    while(v >= 1024 && i < units.length - 1){ v /= 1024; i++; }
    return (bytes < 0 ? '-' : '') + v.toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
  }
  function fmtDate(value){ if(!value) return 'unknown'; var d = new Date(value); return isNaN(d) ? String(value) : d.toLocaleString(); }
  function riskClass(risk){ risk = String(risk || '').toLowerCase(); if(risk.indexOf('critical') >= 0 || risk.indexOf('high') >= 0) return 'danger'; if(risk.indexOf('medium') >= 0) return 'warning'; return 'success'; }
  function parseJson(id){ try { return JSON.parse(document.getElementById(id).textContent || '{}'); } catch(e) { return {}; } }

  var raw = parseJson('data');
  var progressConfig = parseJson('progress-config');
  var files = raw.files || [];
  var directories = raw.directories || raw.treemap || [];
  var duplicates = raw.duplicates || raw.duplicate_clusters || [];
  var recommendations = raw.recommendations || [];
  var events = raw.events || [];
  var categories = raw.categories || [];
  var summary = raw.summary || {};
  var savings = raw.savings || {};
  var status = raw.status || summary.status || 'report';
  var phase = raw.phase || {};
  var generated = raw.updated_at || raw.generated || new Date().toISOString();

  if(categories.length === 0 && summary.file_types){
    categories = Object.keys(summary.file_types).map(function(name){ return {name:name, count:summary.file_types[name], bytes:0, risk:'Low'}; });
  }
  if(recommendations.length === 0 && duplicates.length){
    recommendations = duplicates.slice(0, 8).map(function(group){ return {action:'dedupe', path:(group.paths || group.files || []).join(', '), local_bytes:num(group.reclaimable || group.size), risk:'Low', restore_path:'manifest undo after approved execution'}; });
  }

  var totalFiles = num(summary.total_files) || files.length || num(raw.counts && raw.counts.files_seen);
  var totalSize = num(summary.total_size) || files.reduce(function(sum, file){ return sum + num(file.size); }, 0) || num(savings.discovered_bytes);
  var recommended = num(savings.recommended_local_bytes) || num(summary.reclaimable) || recommendations.reduce(function(sum, rec){ return sum + num(rec.local_bytes || rec.bytes); }, 0);
  var verified = num(savings.verified_local_bytes || savings.completed_local_bytes);
  var cloudBytes = num(savings.cloud_bytes_affected || summary.cloud_bytes_affected);
  var phasePct = phase.total ? Math.max(0, Math.min(100, Math.round(num(phase.index) / num(phase.total) * 100))) : (status === 'completed' ? 100 : 0);

  var maxCategoryBytes = Math.max(1, categories.reduce(function(max, item){ return Math.max(max, num(item.bytes)); }, 0));
  var maxDirectoryBytes = Math.max(1, directories.reduce(function(max, item){ return Math.max(max, num(item.size || item.bytes)); }, 0));

  function stat(label, value, tone){ return '<section class="card span-3"><div class="stat-label">'+esc(label)+'</div><div class="stat-value" style="color:var(--'+tone+')">'+esc(value)+'</div></section>'; }
  function badge(label, cls){ return '<span class="badge '+(cls||'')+'">'+esc(label)+'</span>'; }

  var html = '';
  html += '<section class="hero">';
  html += '<div class="hero-copy"><div class="eyebrow">files-buddy storage command center</div><h1>Local bytes, cloud risk, and cleanup decisions in one place.</h1>';
  html += '<p class="subhead">A self-contained report for macOS storage audits, duplicate review, cache impact, cloud offload planning, manifests, and live run progress.</p>';
  html += '<div class="meta-row">'+badge('status: '+status, status === 'completed' ? 'success' : 'warning')+badge('generated '+fmtDate(generated))+badge(progressConfig.progress_path ? 'live source: '+progressConfig.progress_path : 'embedded report')+'</div></div>';
  html += '<aside class="card status-card"><div><h2>Run Status</h2><p class="phase">'+esc(phase.message || phase.name || 'Static report loaded')+'</p><div class="progress-track"><div class="progress-bar" style="width:'+phasePct+'%"></div></div><p>'+phasePct+'% through tracked phases</p></div><div class="meta-row">'+badge('approved '+fmtBytes(savings.approved_local_bytes), 'warning')+badge('verified '+fmtBytes(verified), verified ? 'success' : '')+'</div></aside>';
  html += '</section>';

  html += '<section class="grid">';
  html += stat('Files Seen', totalFiles.toLocaleString(), 'primary');
  html += stat('Bytes Discovered', fmtBytes(totalSize), 'violet');
  html += stat('Recommended Local Savings', fmtBytes(recommended), 'success');
  html += stat('Cloud Bytes Affected', fmtBytes(cloudBytes), 'cloud');

  html += '<section class="card span-5"><h2>Savings Funnel</h2><div class="chart-bars">';
  [
    ['Discovered', savings.discovered_bytes || totalSize, 'primary'],
    ['Eligible', savings.eligible_bytes, 'violet'],
    ['Recommended', recommended, 'success'],
    ['Approved', savings.approved_local_bytes, 'warning'],
    ['Verified', verified, 'success']
  ].forEach(function(row){ var width = totalSize ? Math.min(100, num(row[1]) / totalSize * 100) : 0; html += '<div class="bar-row"><div class="bar-label">'+esc(row[0])+'</div><div class="bar-shell"><div class="bar-fill" style="width:'+width+'%;background:linear-gradient(90deg,var(--'+row[2]+'),var(--primary))"></div></div><div class="mono">'+fmtBytes(row[1])+'</div></div>'; });
  html += '</div></section>';

  html += '<section class="card span-7"><h2>Reclaimable By Category</h2>';
  if(categories.length){ html += '<div class="chart-bars">'; categories.slice(0, 12).forEach(function(item){ var width = Math.max(3, num(item.bytes) / maxCategoryBytes * 100); html += '<div class="bar-row"><div class="bar-label">'+esc(item.name)+'</div><div class="bar-shell"><div class="bar-fill" style="width:'+width+'%"></div></div><div class="mono">'+esc(item.bytes ? fmtBytes(item.bytes) : (item.count || 0).toLocaleString())+'</div></div>'; }); html += '</div>'; }
  else { html += '<div class="empty">No category data yet.</div>'; }
  html += '</section>';

  html += '<section class="card span-6"><h2>Disk Usage Treemap</h2>';
  if(directories.length){ html += '<div class="treemap">'; directories.slice(0, 12).forEach(function(item){ var alpha = Math.max(.16, num(item.size || item.bytes) / maxDirectoryBytes); html += '<div class="tile" style="background:linear-gradient(135deg,rgba(124,199,255,'+alpha+'),rgba(199,167,255,.16))"><strong>'+esc(item.path || item.name || 'unknown')+'</strong><span class="mono">'+fmtBytes(item.size || item.bytes)+'</span></div>'; }); html += '</div>'; }
  else { html += '<div class="empty">No directory treemap data yet.</div>'; }
  html += '</section>';

  html += '<section class="card span-6"><h2>Risk Matrix</h2><table><thead><tr><th>Risk</th><th>Items</th><th>Bytes</th></tr></thead><tbody>';
  ['Low','Medium','High','Critical'].forEach(function(risk){ var items = recommendations.filter(function(rec){ return String(rec.risk || rec.approval_tier || 'Low').toLowerCase().indexOf(risk.toLowerCase()) >= 0; }); var bytes = items.reduce(function(sum, rec){ return sum + num(rec.local_bytes || rec.bytes); }, 0); html += '<tr><td>'+badge(risk, riskClass(risk))+'</td><td>'+items.length+'</td><td class="mono">'+fmtBytes(bytes)+'</td></tr>'; });
  html += '</tbody></table></section>';

  html += '<section class="card span-8"><h2>Recommendation Cards</h2>';
  if(recommendations.length){ html += '<div class="recommendations">'; recommendations.slice(0, 12).forEach(function(rec){ html += '<article class="rec"><div class="rec-top"><div><h3>'+esc(rec.action || 'review')+'</h3><p class="rec-path mono">'+esc(rec.path || rec.target || 'unknown path')+'</p></div>'+badge(rec.risk || rec.approval_tier || 'Review', riskClass(rec.risk || rec.approval_tier))+'</div><div class="rec-meta">'+badge(fmtBytes(rec.local_bytes || rec.bytes || rec.local_bytes_saved)+' local')+badge('restore: '+(rec.restore_path || 'required'))+'</div><p style="margin-top:10px">'+esc((rec.repercussions || rec.repercussion || []).join ? (rec.repercussions || rec.repercussion || []).join('; ') : (rec.repercussions || rec.repercussion || 'Review dependency evidence before approval.'))+'</p></article>'; }); html += '</div>'; }
  else { html += '<div class="empty">No recommendations in this snapshot.</div>'; }
  html += '</section>';

  html += '<section class="card span-4"><h2>Duplicate Clusters</h2><table><thead><tr><th>Group</th><th>Count</th><th>Bytes</th></tr></thead><tbody>';
  duplicates.slice(0, 8).forEach(function(group, index){ html += '<tr><td>#'+(index+1)+'</td><td>'+esc(group.count || (group.paths || group.files || []).length || 0)+'</td><td class="mono">'+fmtBytes(group.reclaimable || group.size || group.file_len)+'</td></tr>'; });
  if(!duplicates.length) html += '<tr><td colspan="3">No duplicate groups.</td></tr>';
  html += '</tbody></table></section>';

  html += '<section class="card span-6"><h2>Progress Timeline</h2>';
  if(events.length){ html += '<div class="timeline">'; events.slice(-12).forEach(function(event){ html += '<div class="event"><strong>'+esc(event.level || 'info')+'</strong> <span class="mono">'+esc(fmtDate(event.time))+'</span><br>'+esc(event.message || '')+'</div>'; }); html += '</div>'; }
  else { html += '<div class="empty">No progress events yet.</div>'; }
  html += '</section>';

  html += '<section class="card span-6"><h2>Manifest Explorer</h2><table><tbody><tr><th>Run ID</th><td class="mono">'+esc(raw.run_id || 'n/a')+'</td></tr><tr><th>Manifest</th><td class="mono">'+esc(raw.manifest || (raw.manifest && raw.manifest.path) || 'not created')+'</td></tr><tr><th>Mode</th><td>'+esc(raw.mode || 'report')+'</td></tr><tr><th>Progress File</th><td class="mono">'+esc(progressConfig.progress_path || 'embedded only')+'</td></tr></tbody></table></section>';

  html += '</section><p class="footer">Built for files-buddy. Source design contract: shadcn/ui components, Tailwind CSS v4 tokens, and Recharts visualizations; packaged as a self-contained static dashboard.</p>';
  document.getElementById('app').innerHTML = html;
})();
</script>
</body>
</html>
