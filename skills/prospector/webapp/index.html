<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Prospector Dashboard</title>
<style>
@layer reset, tokens, base, components, views, utilities;

@layer reset {
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :where(ul, ol) { list-style: none; }
}

@layer tokens {
  :root {
    --s1: oklch(0.15 0.02 260); --s2: oklch(0.20 0.02 260); --s3: oklch(0.25 0.02 260);
    --border: oklch(0.35 0.02 260); --text-1: oklch(0.93 0.01 260); --text-2: oklch(0.65 0.02 260);
    --accent: oklch(0.65 0.20 270); --ok: oklch(0.70 0.18 155); --warn: oklch(0.75 0.18 85);
    --bad: oklch(0.65 0.22 25); --purple: oklch(0.65 0.20 310);
    --info: oklch(0.65 0.14 220); --muted: oklch(0.50 0.03 260); --surface: oklch(0.12 0.015 260);
    --gap: 0.75rem; --r0: 0px; --r1: 8px;
    color-scheme: dark;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --s1: oklch(0.96 0.01 260); --s2: oklch(0.99 0.005 260); --s3: oklch(1.0 0 260);
      --border: oklch(0.82 0.01 260); --text-1: oklch(0.20 0.02 260); --text-2: oklch(0.45 0.02 260);
      color-scheme: light;
      --info: oklch(0.45 0.12 220); --muted: oklch(0.60 0.03 260); --surface: oklch(0.94 0.005 260);
    }
  }
}

@layer base {
  body {
    font-family: system-ui, -apple-system, sans-serif; background: var(--s1); color: var(--text-1);
    line-height: 1.5; min-height: 100dvh;
  }
  @media (prefers-color-scheme: dark) {
    body { position: relative; }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, oklch(0.20 0.06 270 / 0.4), transparent),
        radial-gradient(ellipse 60% 50% at 85% 80%, oklch(0.18 0.05 310 / 0.3), transparent),
        radial-gradient(ellipse 70% 40% at 50% 50%, oklch(0.17 0.04 155 / 0.15), transparent);
    }
  }
  @media (prefers-reduced-motion: no-preference) and (prefers-color-scheme: dark) {
    body::before { animation: aurora 30s ease-in-out infinite alternate; }
  }
  @keyframes aurora { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }
  .mono { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; }
  h1, h2, h3 { font-weight: 700; }
  h1 { font-size: 1.4rem; } h2 { font-size: 1.05rem; margin-bottom: 0.4rem; } h3 { font-size: 0.9rem; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--s2); color: var(--text-1); padding: 0.35em 0.8em; border-radius: var(--r1); }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: oklch(0.15 0.02 260); border-color: var(--accent); }
  select, input { font: inherit; background: var(--s2); color: var(--text-1); border: 1px solid var(--border); padding: 0.3em 0.6em; border-radius: var(--r1); }
  select:focus, input:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
}

@layer components {
  .glass {
    background: light-dark(oklch(1 0 0 / 0.7), oklch(0.20 0.02 260 / 0.5));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid light-dark(oklch(0.85 0.01 260), oklch(0.30 0.02 260));
    border-radius: var(--r1); padding: var(--gap); container-type: inline-size;
    &:hover { border-color: light-dark(oklch(0.70 0.10 270 / 0.4), oklch(0.50 0.12 270 / 0.4)); box-shadow: 0 0 12px oklch(0.65 0.20 270 / 0.08); }
  }
  .dpanel {
    background: light-dark(oklch(0.98 0.005 260), oklch(0.18 0.015 260));
    border: 1px solid var(--border); border-radius: var(--r0); padding: var(--gap);
  }
  @media (prefers-reduced-motion: no-preference) {
    .glass, .dpanel { animation: fadeIn 0.4s ease-out both; }
    @starting-style { .glass, .dpanel { opacity: 0; transform: translateY(8px); } }
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 1.6rem; padding: 0.2em 0.55em; border-radius: 999px;
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .tier-strong { background: var(--ok); color: oklch(0.15 0.02 260); }
  .tier-moderate { background: var(--warn); color: oklch(0.15 0.02 260); }
  .tier-weak { background: var(--bad); color: oklch(0.15 0.02 260); }
  .status-badge { background: var(--s3); color: var(--text-2); border: 1px solid var(--border); }
  .pill { display: inline-block; padding: 0.1em 0.45em; border-radius: 999px; font-size: 0.7rem; border: 1px solid var(--border); color: var(--text-2); margin: 0.1em; }
  .err { background: var(--s2); border: 2px solid var(--bad); border-radius: var(--r1); padding: var(--gap);
    & h2 { color: var(--bad); margin-bottom: 0.4rem; }
    & pre { white-space: pre-wrap; word-break: break-all; font-size: 0.8rem; color: var(--text-2); }
  }
  .empty { text-align: center; padding: 3rem var(--gap); color: var(--text-2); }
}

@layer views {
  /* Top nav */
  .topbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
    padding: 0.6rem var(--gap); border-bottom: 1px solid var(--border);
    background: light-dark(oklch(1 0 0 / 0.85), oklch(0.13 0.02 260 / 0.85));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 50;
  }
  .topbar h1 { font-size: 1.1rem; margin-right: auto; }
  .topbar-stats { display: flex; gap: 0.6rem; font-size: 0.78rem; color: var(--text-2); }
  .topbar-stats .stat { display: flex; align-items: center; gap: 0.2rem; }
  .topbar-stats .stat-n { font-weight: 700; color: var(--text-1); }
  .nav-links { display: flex; gap: 0.3rem; }
  .nav-links a {
    padding: 0.3em 0.7em; border-radius: var(--r1); font-size: 0.78rem; font-weight: 600;
    color: var(--text-2); text-decoration: none;
  }
  .nav-links a:hover, .nav-links a.active { background: var(--s3); color: var(--text-1); }
  .nav-links a.active { border-bottom: 2px solid var(--accent); }

  .main-wrap { padding: var(--gap); max-width: 1400px; margin: 0 auto; }

  /* Pipeline kanban */
  .kanban { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--gap); align-items: start; }
  .kanban-col { min-width: 0; }
  .kanban-col h3 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); padding: 0.3rem 0; border-bottom: 2px solid var(--border); margin-bottom: 0.5rem; }
  .kanban-col h3 .count { font-size: 0.72rem; color: var(--muted); margin-left: 0.3rem; }

  /* Opportunity card */
  .opp-card { margin-bottom: 0.5rem; cursor: pointer; }
  .opp-card .opp-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.25rem; display: flex; align-items: start; gap: 0.4rem; }
  .opp-card .opp-title .opp-id { font-size: 0.72rem; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .opp-card .opp-liner { font-size: 0.78rem; color: var(--text-2); margin-bottom: 0.4rem; }
  .opp-card .opp-meta { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }

  /* Triage mini */
  .triage-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.25rem; margin-top: 0.4rem; font-size: 0.7rem; }
  .triage-mini .td-item { display: flex; justify-content: space-between; padding: 0.15em 0.3em; border-radius: 4px; background: light-dark(oklch(0.95 0.005 260), oklch(0.22 0.015 260)); }
  .triage-mini .td-label { color: var(--text-2); text-transform: uppercase; font-size: 0.6rem; letter-spacing: 0.04em; }
  .triage-mini .td-val { font-weight: 700; }
  .triage-mini .td-val.strong { color: var(--ok); }
  .triage-mini .td-val.moderate { color: var(--warn); }
  .triage-mini .td-val.weak { color: var(--bad); }

  /* Feed view */
  .feed { display: flex; flex-direction: column; gap: 0.5rem; max-width: 800px; margin: 0 auto; }
  .feed .opp-card .opp-date { font-size: 0.7rem; color: var(--muted); }

  /* Leaderboard view */
  .leaderboard { max-width: 900px; margin: 0 auto; }
  .lb-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .lb-table th { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 2px solid var(--border); color: var(--text-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .lb-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid light-dark(oklch(0.92 0.005 260), oklch(0.25 0.015 260)); vertical-align: top; }
  .lb-table tr { cursor: pointer; }
  .lb-table tr:hover td { background: light-dark(oklch(0.95 0.005 260 / 0.5), oklch(0.22 0.02 260 / 0.5)); }
  .lb-rank { font-weight: 700; color: var(--accent); text-align: center; }

  /* Detail view */
  .detail { max-width: 900px; margin: 0 auto; }
  .detail-header { margin-bottom: var(--gap); }
  .detail-header h2 { font-size: 1.2rem; margin-bottom: 0.3rem; }
  .detail-header .detail-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
  .detail-section { margin-bottom: var(--gap); }
  .detail-section h3 { font-size: 0.9rem; margin-bottom: 0.4rem; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.04em; }
  .triage-full { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.4rem; }
  .triage-full .tf-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5em 0.7em; border-radius: var(--r1); background: light-dark(oklch(0.95 0.005 260), oklch(0.22 0.015 260)); }
  .triage-full .tf-label { font-size: 0.78rem; color: var(--text-2); }
  .triage-full .tf-val { font-weight: 700; font-size: 0.82rem; }
  .ev-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .ev-item { padding: 0.5rem; border-left: 3px solid var(--accent); font-size: 0.82rem; background: light-dark(oklch(0.97 0.005 260), oklch(0.16 0.015 260)); border-radius: 0 var(--r1) var(--r1) 0; }
  .ev-item .ev-quote { font-style: italic; color: var(--text-1); margin-bottom: 0.25rem; }
  .ev-item .ev-meta { font-size: 0.72rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .counter-list { display: flex; flex-direction: column; gap: 0.3rem; }
  .counter-item { padding: 0.4rem 0.5rem; font-size: 0.82rem; color: var(--text-2); border-left: 3px solid var(--bad); background: light-dark(oklch(0.97 0.005 260), oklch(0.16 0.015 260)); border-radius: 0 var(--r1) var(--r1) 0; }
  .status-actions { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .status-actions button { font-size: 0.75rem; }
  .notes-area { width: 100%; min-height: 4rem; resize: vertical; font: inherit; background: var(--s2); color: var(--text-1); border: 1px solid var(--border); border-radius: var(--r1); padding: 0.5em; margin-top: 0.3rem; }

  /* Stats view */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--gap); }
  .stat-card h3 { margin-bottom: 0.5rem; }
  .stat-bar-row { display: grid; grid-template-columns: 120px 1fr 3rem; align-items: center; gap: 0.4rem; margin-bottom: 0.3rem; }
  .stat-bar-row .sbl { font-size: 0.78rem; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stat-bar-track { height: 20px; background: light-dark(oklch(0.90 0.01 260), oklch(0.28 0.02 260)); border-radius: 4px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 4px; }
  .stat-bar-row .sbn { font-size: 0.82rem; font-weight: 700; text-align: right; }

  /* Filters */
  .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: var(--gap); align-items: center; }
  .filters label { font-size: 0.78rem; color: var(--text-2); }

  /* Profile view */
  .profile-form { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--gap); }
  .form-field { display: flex; flex-direction: column; gap: 0.3rem; }
  .form-field label { font-size: 0.78rem; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-field input[type="number"] { width: 110px; }
  .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; padding: 0.35em 0.5em; border: 1px solid var(--border); border-radius: var(--r1); background: var(--s2); min-height: 2.2rem; }
  .tag-pill { display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.1em 0.4em; border-radius: 999px; font-size: 0.72rem; background: var(--accent); color: oklch(0.15 0.02 260); }
  .tag-pill .rm-btn { background: none; border: none; color: inherit; padding: 0 0.1em; cursor: pointer; font-size: 0.9rem; line-height: 1; }
  .tag-add-inp { border: none; background: none; color: var(--text-1); padding: 0; flex: 1 1 120px; min-width: 80px; outline: none; font: inherit; font-size: 0.82rem; }

  /* Sessions table */
  .sessions-wrap { overflow-x: auto; }
  .sessions-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .sessions-table th { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 2px solid var(--border); color: var(--text-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .sessions-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid light-dark(oklch(0.92 0.005 260), oklch(0.25 0.015 260)); }
  .sessions-table tr { cursor: pointer; }
  .sessions-table tr:hover td { background: light-dark(oklch(0.95 0.005 260 / 0.5), oklch(0.22 0.02 260 / 0.5)); }

  /* Toast */
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 0.4rem; pointer-events: none; }
  .toast { padding: 0.55em 1em; border-radius: var(--r1); font-size: 0.82rem; font-weight: 600; max-width: 320px; box-shadow: 0 4px 20px oklch(0 0 0 / 0.35); pointer-events: all; animation: toastIn 0.2s ease-out; cursor: pointer; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .toast.error { background: var(--bad); color: oklch(0.15 0.02 260); }
  .toast.success { background: var(--ok); color: oklch(0.15 0.02 260); }
  .toast.info { background: var(--info); color: oklch(0.95 0.01 260); }

  /* Filter bar */
  .filter-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: var(--gap); align-items: center; }
  .filter-bar input[type="search"] { padding: 0.3em 0.7em; border-radius: var(--r1); flex: 1 1 180px; min-width: 140px; }
  .tier-pills { display: flex; gap: 0.2rem; }
  .tier-pills button { font-size: 0.72rem; padding: 0.25em 0.6em; }
  .tier-pills button.active { background: var(--accent); color: oklch(0.15 0.02 260); border-color: var(--accent); }

  /* Loading spinner */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 10rem; }
  .spinner { width: 2rem; height: 2rem; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Export dropdown */
  .export-wrap { position: relative; }
  .export-dropdown { position: absolute; right: 0; top: calc(100% + 4px); background: var(--s2); border: 1px solid var(--border); border-radius: var(--r1); min-width: 140px; z-index: 100; overflow: hidden; display: none; box-shadow: 0 4px 16px oklch(0 0 0 / 0.25); }
  .export-dropdown.open { display: block; }
  .export-dropdown a { display: block; padding: 0.4em 0.9em; font-size: 0.78rem; color: var(--text-1); text-decoration: none; }
  .export-dropdown a:hover { background: var(--s3); text-decoration: none; }

  /* Copy CLI button */
  .copy-cli-btn { background: none; border: none; color: var(--muted); font-size: 0.75rem; padding: 0 0.2em; margin-left: auto; cursor: pointer; opacity: 0.7; transition: opacity 0.15s; }
  .copy-cli-btn:hover { opacity: 1; color: var(--accent); }
}

@layer utilities {
  .mt-s { margin-top: 0.4rem; } .mt-m { margin-top: var(--gap); }
  .td { color: var(--text-2); } .fw { font-weight: 700; } .fs { font-size: 0.78rem; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: no-preference) {
    .stat-bar-fill { transition: width 0.6s ease-out; }
  }
}

@media print {
  body { background: #fff !important; color: #111; }
  .topbar { position: static; background: #fff; border-bottom: 1px solid #ccc; }
  .glass { background: #fff; backdrop-filter: none; border: 1px solid #ccc; }
}
@media (max-width: 640px) {
  .kanban { grid-template-columns: 1fr; }
  .triage-mini { grid-template-columns: repeat(2, 1fr); }
  .triage-full { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr; }
  .topbar { flex-direction: column; align-items: stretch; }
  .nav-links { flex-wrap: wrap; }
}
</style>
</head>
<body>

<nav class="topbar" role="navigation" aria-label="Main navigation">
  <h1>Prospector</h1>
  <div class="topbar-stats" id="topbar-stats"></div>
  <div class="nav-links" id="nav-links">
    <a href="#pipeline">Pipeline</a>
    <a href="#feed">Feed</a>
    <a href="#leaderboard">Leaderboard</a>
    <a href="#sessions">Sessions</a>
    <a href="#profile">Profile</a>
    <a href="#stats">Stats</a>
  </div>
  <div class="export-wrap">
    <button id="export-btn" aria-haspopup="true" aria-expanded="false">Export ▾</button>
    <div class="export-dropdown" id="export-dropdown" role="menu">
      <a href="/api/export/json" download="prospector-export.json" role="menuitem">JSON</a>
      <a href="/api/export/csv" download="prospector-export.csv" role="menuitem">CSV</a>
      <a href="/api/export/html" download="prospector-report.html" role="menuitem">HTML Report</a>
    </div>
  </div>
</nav>

<main class="main-wrap" id="app" aria-label="Prospector Dashboard"></main>

<script>
(() => {
  "use strict";

  const $ = (s, p) => (p || document).querySelector(s);
  const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
  const app = $("#app");

  // ---- Helpers ----
  function esc(s) { if (s == null) return ""; const d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }
  function el(tag, attrs, txt) {
    const e = document.createElement(tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) { if (v != null) e.setAttribute(k, v); }
    if (txt != null) e.textContent = txt;
    return e;
  }
  function tierClass(t) {
    if (!t) return "";
    return "tier-" + t.toLowerCase();
  }
  function ratingClass(r) { return r || ""; }

  const TIER_ORDER = { strong: 0, moderate: 1, weak: 2 };
  const STATUS_ORDER = ["discovered", "evaluated", "researching", "building", "launched", "parked", "rejected"];
  const STATUS_LABELS = { discovered: "Discovered", evaluated: "Evaluated", researching: "Researching", building: "Building", launched: "Launched", parked: "Parked", rejected: "Rejected" };
  const TRANSITIONS = {
    discovered: ["evaluated", "parked", "rejected"],
    evaluated: ["researching", "parked", "rejected"],
    researching: ["building", "parked"],
    building: ["launched", "parked"],
    launched: ["parked"],
    parked: [],
    rejected: [],
  };
  const DIMENSION_LABELS = {
    triage_bootstrappability: "Bootstrap",
    triage_pmf: "PMF",
    triage_competition: "Competition",
    triage_revenue: "Revenue",
    triage_technical: "Technical",
    triage_moat: "Moat",
  };
  const SIGNAL_LABELS = {
    pain_no_solution: "Pain + No Solution",
    dying_product: "Dying Product",
    platform_expansion: "Platform Expansion",
    rising_trend: "Rising Trend",
    terrible_ux: "Terrible UX",
    manual_workflow: "Manual Workflow",
  };

  // ---- API ----
  async function api(path, opts) {
    const res = await fetch(`/api${path}`, { headers: { "Content-Type": "application/json" }, ...opts });
    if (!res.ok) {
      const body = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(body.detail || res.statusText);
    }
    return res.json();
  }

  // ---- State ----
  let allOpps = [];
  let statsData = {};

  async function loadData() {
    try {
      [allOpps, statsData] = await Promise.all([api("/opportunities?limit=500"), api("/stats")]);
    } catch (e) {
      allOpps = [];
      statsData = { total: 0, by_status: {}, by_tier: {}, by_signal: {}, by_niche: {} };
    }
    renderTopbarStats();
  }

  function renderTopbarStats() {
    const ts = $("#topbar-stats");
    ts.innerHTML = "";
    const total = statsData.total || 0;

    frag.appendChild(h);

    // Filters

    tierSel.appendChild(el("option", { value: "" }, "All"));
    for (const t of ["strong", "moderate", "weak"]) tierSel.appendChild(el("option", { value: t }, t));
    filters.appendChild(tierSel);
    filters.appendChild(el("label", { style: "margin-left:0.5rem" }, "Niche: "));
    const nicheSel = el("select", { id: "f-niche" });
    nicheSel.appendChild(el("option", { value: "" }, "All"));
    const niches = [...new Set(allOpps.map(o => o.niche))].sort();
    for (const n of niches) nicheSel.appendChild(el("option", { value: n }, n));
    filters.appendChild(nicheSel);
    frag.appendChild(filters);

    function renderKanban() {
      const fTier = tierSel.value;
      const fNiche = nicheSel.value;
      let filtered = allOpps;
      if (fTier) filtered = filtered.filter(o => o.triage_tier === fTier);
      if (fNiche) filtered = filtered.filter(o => o.niche === fNiche);

      const board = el("div", { class: "kanban" });
      for (const status of STATUS_ORDER) {
        const col = el("div", { class: "kanban-col" });
        const opps = filtered.filter(o => o.status === status);
        const header = el("h3");
        header.textContent = STATUS_LABELS[status];
        header.appendChild(el("span", { class: "count" }, `(${opps.length})`));
        col.appendChild(header);
        for (const opp of opps) col.appendChild(renderOppCard(opp));
        if (opps.length === 0) col.appendChild(el("div", { class: "empty fs" }, "No opportunities"));
        board.appendChild(col);
      }

      const existing = frag.querySelector(".kanban") || app.querySelector(".kanban");
      if (existing) existing.replaceWith(board);
      else frag.appendChild(board);
    }

    tierSel.addEventListener("change", renderKanban);
    nicheSel.addEventListener("change", renderKanban);
    renderKanban();

    app.innerHTML = "";

        activeFeedTier = val;
        feedTierBtns.forEach((b, i) => b.classList.toggle("active", feedTierOpts[i][0] === val));

      });

                     (!q || `${o.title} ${o.one_liner} ${o.niche}`.toLowerCase().includes(q)))
        .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
      feed.innerHTML = "";
      if (sorted.length === 0) {
        feed.appendChild(el("div", { class: "empty" }, q || activeFeedTier ? "No opportunities match your filter." : "No opportunities discovered yet."));
      }
      for (const opp of sorted) feed.appendChild(renderOppCard(opp, { showDate: true }));

    let feedDebounce;
    searchInp.addEventListener("input", () => { clearTimeout(feedDebounce); feedDebounce = setTimeout(renderFeedCards, 250); });

  function renderLeaderboard() {
    const frag = document.createDocumentFragment();

    const filterBar = el("div", { class: "filter-bar" });

    const lbTierOpts = [["", "All"], ["strong", "Strong"], ["moderate", "Moderate"], ["weak", "Weak"]];
    const lbTierBtns = [];
    for (const [val, label] of lbTierOpts) {
      const btn = el("button", { class: val === activeLbTier ? "active" : "" }, label);
      btn.addEventListener("click", () => {
        activeLbTier = val;
        lbTierBtns.forEach((b, i) => b.classList.toggle("active", lbTierOpts[i][0] === val));
        renderLbTable();
      });
      lbTierBtns.push(btn);
      tierPillWrap.appendChild(btn);
    }
    filterBar.appendChild(tierPillWrap);
    frag.appendChild(filterBar);

    const lbWrap = el("div", { class: "leaderboard" });
    frag.appendChild(lbWrap);

    function renderLbTable() {
      const q = searchInp.value.trim().toLowerCase();
      const sorted = [...allOpps]
        .filter(o => (!activeLbTier || o.triage_tier === activeLbTier) &&
                     (!q || `${o.title} ${o.one_liner} ${o.niche}`.toLowerCase().includes(q)))
        .sort((a, b) => {
          const ta = TIER_ORDER[a.triage_tier] ?? 3;
          const tb = TIER_ORDER[b.triage_tier] ?? 3;
          if (ta !== tb) return ta - tb;
          return (b.evidence?.length || 0) - (a.evidence?.length || 0);
        });

      lbWrap.innerHTML = "";
      if (sorted.length === 0) {
        lbWrap.appendChild(el("div", { class: "empty" }, q || activeLbTier ? "No opportunities match your filter." : "No opportunities to rank."));
        return;
      }

      const table = el("table", { class: "lb-table" });

      table.appendChild(thead);

        row.appendChild(tierTd);
        row.appendChild(el("td", { class: "fs" }, SIGNAL_LABELS[opp.primary_signal] || opp.primary_signal));
        row.appendChild(el("td", { class: "mono" }, String(opp.evidence?.length || 0)));
        const statusTd = el("td");
        statusTd.appendChild(el("span", { class: "badge status-badge" }, STATUS_LABELS[opp.status] || opp.status));
        row.appendChild(statusTd);
        tbody.appendChild(row);
      });
      table.appendChild(tbody);
      lbWrap.appendChild(table);
    }

    let lbDebounce;
    searchInp.addEventListener("input", () => { clearTimeout(lbDebounce); lbDebounce = setTimeout(renderLbTable, 250); });
    renderLbTable();

    app.innerHTML = "";
    app.appendChild(frag);
  }

  async function renderDetail(id) {
    app.innerHTML = "";
    const loading = el("div", { class: "empty" }, "Loading...");

    let opp;
    try {
      opp = await api(`/opportunities/${encodeURIComponent(id)}`);

      app.appendChild(el("div", { class: "err" }, `Error: ${e.message}`));

    }

    app.innerHTML = "";
    const frag = document.createDocumentFragment();
    const detail = el("div", { class: "detail" });

    // Back link

    detail.appendChild(back);

    header.appendChild(el("h2", {}, `${opp.id}: ${opp.title}`));

    meta.appendChild(el("span", { class: "pill" }, opp.niche));
    meta.appendChild(el("span", { class: "pill" }, SIGNAL_LABELS[opp.primary_signal] || opp.primary_signal));
    if (opp.created_at) meta.appendChild(el("span", { class: "fs td" }, `Discovered ${opp.created_at.split("T")[0]}`));
    if (opp.mvp_days) meta.appendChild(el("span", { class: "pill" }, `${opp.mvp_days}d MVP`));
    if (opp.mvp_tech_stack) meta.appendChild(el("span", { class: "pill" }, opp.mvp_tech_stack));
    header.appendChild(meta);
    header.appendChild(el("p", { class: "mt-s", style: "font-size:0.92rem" }, opp.one_liner));
    detail.appendChild(header);

    // Triage full
    const triageSec = el("div", { class: "detail-section" });
    triageSec.appendChild(el("h3", {}, "Triage Assessment"));
    const triageGrid = el("div", { class: "triage-full" });
    const dims = ["triage_bootstrappability", "triage_pmf", "triage_competition", "triage_revenue", "triage_technical", "triage_moat"];
    for (const dim of dims) {
      const val = opp[dim];
      const item = el("div", { class: "tf-item" });
      item.appendChild(el("span", { class: "tf-label" }, DIMENSION_LABELS[dim]));
      item.appendChild(el("span", { class: `tf-val ${ratingClass(val)}` }, val || "-"));
      triageGrid.appendChild(item);
    }
    triageSec.appendChild(triageGrid);
    if (opp.triage_reasoning) {
      triageSec.appendChild(el("p", { class: "fs td mt-s" }, opp.triage_reasoning));
    }
    detail.appendChild(triageSec);

    // Evidence
    const evidence = opp.evidence || [];
    if (evidence.length > 0) {
      const evSec = el("div", { class: "detail-section" });
      evSec.appendChild(el("h3", {}, `Evidence (${evidence.length})`));
      const evList = el("div", { class: "ev-list" });
      for (const ev of evidence) {
        const item = el("div", { class: "ev-item" });
        if (ev.quote) item.appendChild(el("div", { class: "ev-quote" }, `"${ev.quote}"`));
        const evMeta = el("div", { class: "ev-meta" });
        if (ev.source_category) evMeta.appendChild(el("span", { class: "pill" }, ev.source_category));
        if (ev.signal_type) evMeta.appendChild(el("span", { class: "pill" }, SIGNAL_LABELS[ev.signal_type] || ev.signal_type));
        if (ev.intensity) {
          const cls = ev.intensity === "strong" ? "tier-strong" : ev.intensity === "moderate" ? "tier-moderate" : "tier-weak";
          evMeta.appendChild(el("span", { class: `badge ${cls}`, style: "font-size:0.6rem" }, ev.intensity));
        }
        if (ev.source_tool) evMeta.appendChild(el("span", { class: "pill" }, ev.source_tool));
        if (ev.source_url) {
          const link = el("a", { href: ev.source_url, target: "_blank", rel: "noopener" }, ev.source_url);
          evMeta.appendChild(link);
        }
        if (ev.payment_signal) evMeta.appendChild(el("span", { style: "color:var(--ok);font-weight:700;font-size:0.72rem" }, "$ payment signal"));
        item.appendChild(evMeta);
        if (ev.context) item.appendChild(el("div", { class: "fs td mt-s" }, ev.context));
        evList.appendChild(item);
      }
      evSec.appendChild(evList);
      detail.appendChild(evSec);
    }

    // Counter-evidence
    let counterEvidence = [];
    try {
      counterEvidence = JSON.parse(opp.counter_evidence_json || "[]");
    } catch { counterEvidence = []; }
    if (counterEvidence.length > 0) {
      const ceSec = el("div", { class: "detail-section" });
      ceSec.appendChild(el("h3", { style: "color:var(--bad)" }, "Why This Might Be Wrong"));
      const ceList = el("div", { class: "counter-list" });
      for (const ce of counterEvidence) {
        ceList.appendChild(el("div", { class: "counter-item" }, typeof ce === "string" ? ce : JSON.stringify(ce)));
      }
      ceSec.appendChild(ceList);
      detail.appendChild(ceSec);
    }

    // Panel verdict
    if (opp.panel_json) {
      let panel;
      try { panel = JSON.parse(opp.panel_json); } catch { panel = null; }
      if (panel) {
        const panelSec = el("div", { class: "detail-section glass" });
        panelSec.appendChild(el("h3", {}, "Expert Panel"));
        if (panel.final_verdict) {
          const vBadge = el("span", { class: "badge", style: `background:${panel.final_verdict === "go" ? "var(--ok)" : panel.final_verdict === "nogo" ? "var(--bad)" : "var(--warn)"};color:oklch(0.15 0.02 260)` }, panel.final_verdict.toUpperCase());
          panelSec.appendChild(vBadge);
        }
        if (panel.synthesis) panelSec.appendChild(el("p", { class: "fs mt-s" }, panel.synthesis));
        if (panel.conditions?.length) {
          const condDiv = el("div", { class: "mt-s" });
          condDiv.appendChild(el("strong", { class: "fs" }, "Conditions: "));
          condDiv.appendChild(el("span", { class: "fs td" }, panel.conditions.join("; ")));
          panelSec.appendChild(condDiv);
        }
        detail.appendChild(panelSec);
      }
    }

    // Status transitions
    const statusSec = el("div", { class: "detail-section" });
    statusSec.appendChild(el("h3", {}, "Lifecycle"));
    const currentStatus = opp.status;
    const transitions = TRANSITIONS[currentStatus] || [];
    if (transitions.length > 0) {
      const actions = el("div", { class: "status-actions" });
      actions.appendChild(el("span", { class: "fs td" }, `Current: ${STATUS_LABELS[currentStatus]}. Transition to:`));
      for (const next of transitions) {
        const btn = el("button", {}, STATUS_LABELS[next]);
        btn.addEventListener("click", async () => {
          try {
            await api(`/opportunities/${encodeURIComponent(opp.id)}`, {
              method: "PATCH",
              body: JSON.stringify({ status: next }),
            });
            await loadData();
            renderDetail(opp.id);
          } catch (e) {
            toast(`Transition failed: ${e.message}`, "error");
          }
        });
        actions.appendChild(btn);
      }
      statusSec.appendChild(actions);
    } else {
      statusSec.appendChild(el("p", { class: "fs td" }, `${STATUS_LABELS[currentStatus]} is a terminal state.`));
    }
    detail.appendChild(statusSec);

    // Notes
    const notesSec = el("div", { class: "detail-section" });
    notesSec.appendChild(el("h3", {}, "Notes"));
    const notesArea = el("textarea", { class: "notes-area", placeholder: "Add notes..." });
    notesArea.value = opp.notes || "";
    notesSec.appendChild(notesArea);
    const saveBtn = el("button", { class: "mt-s" }, "Save Notes");
    saveBtn.addEventListener("click", async () => {
      try {
        await api(`/opportunities/${encodeURIComponent(opp.id)}`, {
          method: "PATCH",
          body: JSON.stringify({ notes: notesArea.value }),
        });
        saveBtn.textContent = "Saved";
        setTimeout(() => { saveBtn.textContent = "Save Notes"; }, 1500);
      } catch (e) {
        toast(`Save failed: ${e.message}`, "error");
      }
    });
    notesSec.appendChild(saveBtn);
    detail.appendChild(notesSec);

    // Delete
    const delSec = el("div", { class: "detail-section" });
    const delBtn = el("button", { style: "border-color:var(--bad);color:var(--bad)" }, "Delete Opportunity");
    delBtn.addEventListener("click", async () => {
      if (!confirm(`Delete ${opp.id}: ${opp.title}?`)) return;
      try {
        await api(`/opportunities/${encodeURIComponent(opp.id)}`, { method: "DELETE" });
        await loadData();
        location.hash = "#pipeline";
      } catch (e) {
        toast(`Delete failed: ${e.message}`, "error");
      }
    });
    delSec.appendChild(delBtn);
    detail.appendChild(delSec);

    frag.appendChild(detail);
    app.appendChild(frag);
  }

  function renderStatBars(title, data, color) {
    const card = el("div", { class: "glass stat-card" });
    card.appendChild(el("h3", {}, title));
    const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
    const max = Math.max(...entries.map(e => e[1]), 1);
    for (const [label, count] of entries) {
      const row = el("div", { class: "stat-bar-row" });
      row.appendChild(el("span", { class: "sbl" }, label));
      const track = el("div", { class: "stat-bar-track" });
      const fill = el("div", { class: "stat-bar-fill" });
      fill.style.width = `${(count / max) * 100}%`;
      fill.style.background = color;
      track.appendChild(fill);
      row.appendChild(track);
      row.appendChild(el("span", { class: "sbn" }, String(count)));
      card.appendChild(row);
    }
    if (entries.length === 0) card.appendChild(el("div", { class: "empty fs" }, "No data"));
    return card;
  }

  function renderStatBarsColored(title, data, colorMap) {
    const card = el("div", { class: "glass stat-card" });
    card.appendChild(el("h3", {}, title));
    const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
    const max = Math.max(...entries.map(e => e[1]), 1);
    for (const [label, count] of entries) {
      const row = el("div", { class: "stat-bar-row" });
      row.appendChild(el("span", { class: "sbl" }, label));
      const track = el("div", { class: "stat-bar-track" });
      const fill = el("div", { class: "stat-bar-fill" });
      fill.style.width = `${(count / max) * 100}%`;
      fill.style.background = colorMap[label] || "var(--accent)";
      track.appendChild(fill);
      row.appendChild(track);
      row.appendChild(el("span", { class: "sbn" }, String(count)));
      card.appendChild(row);
    }
    if (entries.length === 0) card.appendChild(el("div", { class: "empty fs" }, "No data"));
    return card;
  }

  function mapKeys(obj, labelMap) {
    const result = {};
    for (const [k, v] of Object.entries(obj)) result[labelMap[k] || k] = v;
    return result;
  }

  // ---- Toast Notifications ----
  const toastContainer = document.getElementById("toast-container");
  function toast(msg, type = "info") {
    const t = el("div", { class: `toast ${type}`, role: "alert" }, msg);
    t.addEventListener("click", () => t.remove());
    toastContainer.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.remove(); }, 4000);
  }

  // ---- Loading Spinner ----
  function showLoading() {
    const wrap = el("div", { class: "loading" });
    wrap.appendChild(el("div", { class: "spinner", role: "status", "aria-label": "Loading" }));
    return wrap;
  }

  async function renderProfile() {
    app.innerHTML = "";
    app.appendChild(showLoading());
    let profile = {};
    try { profile = await api("/profile"); } catch (e) {
      app.innerHTML = "";
      app.appendChild(el("div", { class: "err glass" }, `Error loading profile: ${e.message}`));
      return;
    }
    app.innerHTML = "";
    const frag = document.createDocumentFragment();
    frag.appendChild(el("h2", { class: "mt-s", style: "margin-bottom:0.5rem" }, "Builder Profile"));

    const card = el("div", { class: "glass profile-form" });

    function tagField(labelText, initialArr, saveRef) {
      const wrap = el("div", { class: "form-field" });
      wrap.appendChild(el("label", {}, labelText));
      const tags = Array.isArray(initialArr) ? [...initialArr] : [];
      const tagWrap = el("div", { class: "tag-input-wrap" });
      saveRef.getValue = () => [...tags];
      function renderTags() {
        tagWrap.innerHTML = "";
        for (const t of tags) {
          const pill = el("span", { class: "tag-pill" }, t);
          const rm = el("button", { type: "button", class: "rm-btn", "aria-label": `Remove ${t}` }, "×");
          rm.addEventListener("click", () => { tags.splice(tags.indexOf(t), 1); renderTags(); });
          pill.appendChild(rm);
          tagWrap.appendChild(pill);
        }
        const inp = el("input", { type: "text", class: "tag-add-inp", placeholder: "Type and press Enter…" });
        inp.addEventListener("keydown", e => {
          if (e.key === "Enter" && inp.value.trim()) { tags.push(inp.value.trim()); inp.value = ""; renderTags(); e.preventDefault(); }
        });
        tagWrap.appendChild(inp);
      }
      renderTags();
      wrap.appendChild(tagWrap);
      return wrap;
    }

    function numField(labelText, profileKey, defaultVal, suffixText) {
      const wrap = el("div", { class: "form-field" });
      wrap.appendChild(el("label", {}, labelText));
      const row = el("div", { style: "display:flex;align-items:center;gap:0.5rem" });
      const inp = el("input", { type: "number", min: "0", value: String(profile[profileKey] ?? defaultVal) });
      row.appendChild(inp);
      if (suffixText) row.appendChild(el("span", { class: "fs td" }, suffixText));
      wrap.appendChild(row);
      return { el: wrap, getValue: () => parseInt(inp.value, 10) || 0 };
    }

    const techRef = {}, interestsRef = {}, avoidRef = {};
    card.appendChild(tagField("Tech Stack", profile.tech_stack, techRef));
    card.appendChild(tagField("Interests / Preferred Niches", profile.interests, interestsRef));
    card.appendChild(tagField("Avoid (niches, tech, complexity)", profile.avoid, avoidRef));

    const budgetFld = numField("Time Budget", "time_budget_hours_week", 10, "hours / week");
    const revenueFld = numField("Revenue Goal (MRR target)", "revenue_goal_mrr", 1000, "USD / month");
    card.appendChild(budgetFld.el);
    card.appendChild(revenueFld.el);

    if (profile.updated_at) {
      card.appendChild(el("p", { class: "fs td" }, `Last updated: ${profile.updated_at.split("T")[0]}`));
    }

    const saveBtn = el("button", { style: "align-self:flex-start" }, "Save Profile");
    saveBtn.addEventListener("click", async () => {
      const body = {
        tech_stack: techRef.getValue(),
        interests: interestsRef.getValue(),
        avoid: avoidRef.getValue(),
        time_budget_hours_week: budgetFld.getValue(),
        revenue_goal_mrr: revenueFld.getValue(),
      };
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving…";
      try {
        await api("/profile", { method: "PUT", body: JSON.stringify(body) });
        toast("Profile saved", "success");
        saveBtn.textContent = "Saved ✓";
        setTimeout(() => { saveBtn.textContent = "Save Profile"; saveBtn.disabled = false; }, 2000);
      } catch (e) {
        toast(`Save failed: ${e.message}`, "error");
        saveBtn.textContent = "Save Profile";
        saveBtn.disabled = false;
      }
    });
    card.appendChild(saveBtn);

    frag.appendChild(card);
    app.innerHTML = "";
    app.appendChild(frag);
  }

  async function renderSessions() {
    app.innerHTML = "";
    app.appendChild(showLoading());
    let sessions = [];
    try { sessions = await api("/sessions"); } catch (e) {
      app.innerHTML = "";
      app.appendChild(el("div", { class: "err glass" }, `Error: ${e.message}`));
      return;
    }
    app.innerHTML = "";
    const frag = document.createDocumentFragment();
    frag.appendChild(el("h2", { class: "mt-s", style: "margin-bottom:0.5rem" }, `Discovery Sessions (${sessions.length})`));

    if (sessions.length === 0) {
      const empty = el("div", { class: "glass empty" });
      empty.appendChild(el("p", {}, "No sessions recorded yet."));
      empty.appendChild(el("p", { class: "fs td mt-s" }, "Run /prospector to start discovering opportunities."));
      frag.appendChild(empty);
    } else {
      const wrap = el("div", { class: "glass sessions-wrap" });
      const table = el("table", { class: "sessions-table" });
      const thead = el("thead");
      const hrow = el("tr");
      for (const h of ["ID", "Mode", "Seed Query", "Found", "Wave", "Status", "Started"]) {
        hrow.appendChild(el("th", {}, h));
      }
      thead.appendChild(hrow);
      table.appendChild(thead);
      const tbody = el("tbody");
      for (const s of sessions) {
        const row = el("tr");
        row.title = "Click to view pipeline";
        row.addEventListener("click", () => { location.hash = "#pipeline"; });
        row.appendChild(el("td", { class: "mono fs" }, s.id));
        row.appendChild(el("td", {}, s.mode));
        row.appendChild(el("td", { class: "fs" }, s.seed_query || "—"));
        row.appendChild(el("td", { class: "mono" }, String(s.opportunities_found || 0)));
        row.appendChild(el("td", { class: "mono" }, String(s.wave_completed || 0)));
        const sTd = el("td");
        const sBadge = el("span", { class: "badge status-badge" }, s.status);
        sTd.appendChild(sBadge);
        row.appendChild(sTd);
        row.appendChild(el("td", { class: "fs td" }, (s.started_at || "").split("T")[0]));
        tbody.appendChild(row);
      }
      table.appendChild(tbody);
      wrap.appendChild(table);
      frag.appendChild(wrap);
    }
    app.innerHTML = "";
    app.appendChild(frag);
  }

  // ---- Router ----
  function updateNav(hash) {
    const links = $$("#nav-links a");
    for (const link of links) {
      const target = link.getAttribute("href");
      link.classList.toggle("active", hash === target || hash.startsWith(target + "/"));
    }
  }

  async function route() {
    const hash = location.hash || "#pipeline";
    updateNav(hash);

    if (hash.startsWith("#detail/")) {
      const id = decodeURIComponent(hash.slice(8));
      await renderDetail(id);
    } else if (hash === "#feed") {
      await loadData();
      renderFeed();
    } else if (hash === "#leaderboard") {
      await loadData();
      renderLeaderboard();
    } else if (hash === "#stats") {
      await renderStats();
    } else if (hash === "#profile") {
      await renderProfile();
    } else if (hash === "#sessions") {
      await renderSessions();
    } else {
      await loadData();
      renderPipeline();
    }
  }

  // ---- Export dropdown ----
  const exportBtn = document.getElementById("export-btn");
  const exportDropdown = document.getElementById("export-dropdown");
  if (exportBtn && exportDropdown) {
    exportBtn.addEventListener("click", e => {
      e.stopPropagation();
      const open = exportDropdown.classList.toggle("open");
      exportBtn.setAttribute("aria-expanded", String(open));
    });
    document.addEventListener("click", () => {
      exportDropdown.classList.remove("open");
      exportBtn.setAttribute("aria-expanded", "false");
    });
  }

  // ---- Keyboard shortcuts ----
  document.addEventListener("keydown", e => {
    if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement?.tagName)) return;
    if (e.key === "Escape" && location.hash.startsWith("#detail/")) {
      history.back();
      return;
    }
    if (e.key === "/") {
      e.preventDefault();
      const searchInput = document.querySelector("input[type='search']");
      if (searchInput) { searchInput.focus(); searchInput.select(); }
    }
  });

  window.addEventListener("hashchange", route);
  route();
})();
</script>
<div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>
</body>
</html>
