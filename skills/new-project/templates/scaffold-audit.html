<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>new-project scaffold audit</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        margin: 0;
        color: #111827;
        background: #f3f4f6;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      .card {
        background: white;
        border-radius: 14px;
        border: 1px solid #e5e7eb;
        padding: 18px;
        margin: 14px 0;
      }
      .gap {
        border-left: 4px solid #f59e0b;
      }
      .ok {
        border-left: 4px solid #10b981;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Scaffold Audit</h1>
      <div class="card ok">
        <h2>Detected</h2>
        <p>Stack, package managers, docs roots, and AI instruction files.</p>
      </div>
      <div class="card gap">
        <h2>Gaps</h2>
        <p>Missing convention artifacts and recommended repair plan.</p>
      </div>
    </main>
  </body>
</html>
