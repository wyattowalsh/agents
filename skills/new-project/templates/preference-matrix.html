<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>new-project preferences</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      h1 {
        color: white;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #111827;
        border-radius: 12px;
        overflow: hidden;
      }
      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #334155;
        text-align: left;
      }
      th {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Preference Matrix</h1>
      <p>
        Use this template to review capability categories, risk levels, and
        preset membership.
      </p>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Category</th>
            <th>Risk</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><code>docs.starlight</code></td>
            <td>docs</td>
            <td>medium</td>
            <td>Lightweight default.</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
